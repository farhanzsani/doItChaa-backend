<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Do It Cha</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6C63FF;
      --primary-dark: #574FD6;
      --accent: #43D9AD;
      --bg: #0F0E17;
      --bg-card: #1A1928;
      --text: #FFFFFE;
      --text-muted: #A7A9BE;
      --border: #2E2B4A;
      --error: #FF6584;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    body::before {
      content: '';
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(108,99,255,0.12) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-text {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.5px;
    }

    .logo-text span { color: var(--accent); }

    .logo-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrap {
      position: relative;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 3rem 0.75rem 1rem;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--primary); }

    .toggle-pw {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 0.25rem;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--text); }

    .error-msg {
      background: rgba(255,101,132,0.1);
      border: 1px solid rgba(255,101,132,0.3);
      color: var(--error);
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      display: none;
    }
    .error-msg.show { display: block; }

    .btn-submit {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.85rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }
    .btn-submit:hover { background: var(--primary-dark); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .back-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .back-link a {
      color: var(--primary);
      text-decoration: none;
    }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-text">Do It <span>Cha</span></div>
      <div class="logo-sub">API Documentation</div>
    </div>

    <h1>Admin Access</h1>
    <p class="subtitle">Enter the admin password to access API documentation.</p>

    <div class="error-msg" id="errorMsg">Incorrect password. Please try again.</div>

    <form id="loginForm">
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Enter admin password" autofocus />
          <button type="button" class="toggle-pw" id="togglePw" title="Toggle visibility">&#128065;</button>
        </div>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">Access API Docs</button>
    </form>

    <div class="back-link"><a href="/">&larr; Back to Home</a></div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const passwordInput = document.getElementById('password');
    const togglePw = document.getElementById('togglePw');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    // Show error if redirected with ?error=1
    if (new URLSearchParams(window.location.search).get('error')) {
      errorMsg.classList.add('show');
    }

    togglePw.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      togglePw.textContent = isPassword ? '\uD83D\uDE48' : '\uD83D\uDC41\uFE0F';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('show');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Verifying...';

      try {
        const res = await fetch('/admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: passwordInput.value }),
        });

        if (res.ok) {
          window.location.href = '/admin';
        } else {
          errorMsg.classList.add('show');
          passwordInput.value = '';
          passwordInput.focus();
        }
      } catch {
        errorMsg.textContent = 'Network error. Please try again.';
        errorMsg.classList.add('show');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Access API Docs';
      }
    });
  </script>
</body>
</html>
